<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Amor ❤️</title>

<style>

body{
font-family: Arial;
text-align:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
margin:0;
padding:0;
color:white;
}

h1{
margin-top:30px;
font-size:40px;
}

p{
font-size:20px;
}

.galeria{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin:20px;
}

.galeria img{
width:150px;
height:150px;
object-fit:cover;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin:20px;
}

button:hover{
background:#ff1e4d;
}

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>

</head>

<body>

<h1>❤️ Nosso Amor ❤️</h1>

<p>Desde 06/12/2023</p>

<h2>Nossa música 🎵</h2>

<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/1mSxbLW7fKABfeY4lGpg0E"
width="300"
height="80"
frameborder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

<h2>Nossas Memórias 📸</h2>

<div class="galeria">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">
<img src="foto7.jpg">
<img src="foto8.jpg">
<img src="foto9.jpg">
<img src="foto10.jpg">

</div>

<button onclick="cairCoracoes()">Eu te amo ❤️</button>

<script>

function cairCoracoes(){

for(let i=0;i<30;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

}

</script>

</body>
</html>
